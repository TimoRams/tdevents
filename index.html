<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David & Timo DJ</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top, #111, #050505);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        /* LOGO */
        .top-bar {
            width: 100%;
            padding: 30px 0;
            display: flex;
            justify-content: center;
        }

        .logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            background: none;
            mix-blend-mode: lighten;

            /* entfernt doppelten Kreis */
            border: none;
            padding: 0;
            background: none;

            box-shadow: 
                0 0 20px rgba(0,255,150,0.3),
                0 0 20px rgba(180,0,255,0.3);

            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.08);
            box-shadow: 
                0 0 30px rgba(0,255,150,0.5),
                0 0 30px rgba(180,0,255,0.5);
        }

        .container {
            max-width: 900px;
            width: 100%;
            padding: 0 20px 40px 20px;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 5px;
            font-weight: 600;
        }

        .slogan {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: #a855f7;
            margin-bottom: 15px;
            font-weight: 500;
        }

        p {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            color: #bbbbbb;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .about-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        /* SOCIALS */
        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .insta-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;

            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);

            padding: 10px 20px;
            border-radius: 30px;

            font-weight: 500;

            backdrop-filter: blur(8px);

            transition: all 0.25s ease;
        }

        .insta-btn svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
            transition: fill 0.3s ease;
        }

        .insta-btn:hover {
            transform: translateY(-3px);
            border-color: #E1306C;
            box-shadow: 0 5px 20px rgba(225,48,108,0.4);
        }

        .insta-btn:hover svg {
            fill: #E1306C;
        }

        /* HERO IMAGE */
        .hero-img {
            width: 100%;
            max-width: 650px;
            border-radius: 16px;

            box-shadow: 
                0 0 40px rgba(0,255,150,0.15),
                0 0 40px rgba(180,0,255,0.15);

            transition: transform 0.3s ease;
        }

        .hero-img:hover {
            transform: scale(1.02);
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <img src="images/Logo.svg" alt="David & Timo Logo" class="logo">
    </div>

    <div class="container">
        <h1>David & Timo 🎧</h1>
        <h2 class="slogan">Zusammen einfach besser!</h2>
        <p>DJ Duo aus Leopoldshöhe</p>

        <div class="about-section">
            <p style="margin-bottom: 0;">
                <strong>Über uns:</strong> Wir sind Timo und David. 
                Wir liefern ab!
            </p>
        </div>

        <div class="socials">
            <a href="https://www.instagram.com/timorams/" target="_blank" class="insta-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 
                    0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm10 2c1.7 0 3 
                    1.3 3 3v10c0 1.7-1.3 3-3 3H7c-1.7 
                    0-3-1.3-3-3V7c0-1.7 1.3-3 3-3h10zm-5 
                    3.5A5.5 5.5 0 1 0 17.5 13 5.5 5.5 0 0 
                    0 12 7.5zm0 2A3.5 3.5 0 1 1 8.5 13 3.5 
                    3.5 0 0 1 12 9.5zm4.8-3.3a1.3 1.3 0 1 
                    0 1.3 1.3 1.3 1.3 0 0 0-1.3-1.3z"/>
                </svg>
                Timo
            </a>

            <a href="https://www.instagram.com/david_.photography_/" target="_blank" class="insta-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 
                    5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm10 
                    2c1.7 0 3 1.3 3 3v10c0 1.7-1.3 3-3 
                    3H7c-1.7 0-3-1.3-3-3V7c0-1.7 1.3-3 
                    3-3h10zm-5 3.5A5.5 5.5 0 1 0 17.5 13 
                    5.5 5.5 0 0 0 12 7.5zm0 2A3.5 3.5 0 
                    1 1 8.5 13 3.5 3.5 0 0 1 12 9.5zm4.8-3.3a1.3 
                    1.3 0 1 0 1.3 1.3 1.3 1.3 0 0 0-1.3-1.3z"/>
                </svg>
                David
            </a>
        </div>

        <img src="images/dj.jpg" alt="David und Timo Setup" class="hero-img">

        <footer>
            © 2026 David & Timo
        </footer>
    </div>

</body>
</html>
