<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timo & David DJ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green: #00ff96;
            --purple: #b400ff;
            --pink: #E1306C;
            --bg: #060608;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text-muted: #888;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── BACKGROUND GLOW ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 10%, rgba(0,255,150,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(180,0,255,0.07) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── HEADER ── */
        header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px 20px;
            animation: fadeDown 0.8s ease both;
        }

        /* LOGO – inline SVG, kein eckiger Kasten */
        .logo-wrapper {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            filter:
                drop-shadow(0 0 18px rgba(0,255,150,0.45))
                drop-shadow(0 0 18px rgba(180,0,255,0.35));
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        .logo-wrapper:hover {
            transform: scale(1.07) rotate(3deg);
            filter:
                drop-shadow(0 0 28px rgba(0,255,150,0.7))
                drop-shadow(0 0 28px rgba(180,0,255,0.6));
        }

        .logo-wrapper svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ── HERO ── */
        .hero {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 10px 20px 50px;
            animation: fadeUp 0.9s 0.2s ease both;
        }

        .hero h1 {
            font-size: clamp(2.2rem, 6vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .hero h1 span {
            background: linear-gradient(90deg, var(--green), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .slogan {
            font-size: clamp(1rem, 3vw, 1.4rem);
            color: #a855f7;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .location {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        /* ── DIVIDER ── */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, var(--green), var(--purple));
            border-radius: 2px;
            margin: 0 auto 32px;
        }

        /* ── ABOUT CARD ── */
        .about-card {
            max-width: 600px;
            margin: 0 auto 36px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px 28px;
            font-size: 1rem;
            color: #ccc;
            line-height: 1.7;
            backdrop-filter: blur(12px);
        }

        .about-card strong {
            color: #fff;
            font-weight: 600;
        }

        /* ── SOCIALS ── */
        .socials {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 48px;
        }

        .insta-btn {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            text-decoration: none;
            color: #fff;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 11px 22px;
            border-radius: 999px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            transition: all 0.25s ease;
        }

        .insta-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: #fff;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.25s ease;
            flex-shrink: 0;
        }

        .insta-btn:hover {
            transform: translateY(-3px);
            border-color: var(--pink);
            box-shadow: 0 8px 24px rgba(225,48,108,0.3);
        }

        .insta-btn:hover svg {
            stroke: var(--pink);
        }

        /* ── MID SECTION (about + photo side by side) ── */
        .mid-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            max-width: 860px;
            margin: 0 auto 48px;
            align-items: center;
        }

        @media (max-width: 640px) {
            .mid-section {
                grid-template-columns: 1fr;
            }
        }

        /* ── HERO IMAGE ── */
        .hero-img-wrap {
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .hero-img-wrap::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 21px;
            background: linear-gradient(135deg, rgba(0,255,150,0.3), rgba(180,0,255,0.3));
            z-index: -1;
        }

        .hero-img {
            width: 100%;
            display: block;
            border-radius: 20px;
            transition: transform 0.4s ease;
        }

        .hero-img:hover {
            transform: scale(1.02);
        }

        /* ── EVENTS SECTION ── */
        .events-section {
            max-width: 860px;
            margin: 0 auto 48px;
            animation: fadeUp 0.9s 0.4s ease both;
        }

        .events-section h3 {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 500;
        }

        .events-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .event-tag {
            padding: 9px 20px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-size: 0.88rem;
            font-weight: 500;
            color: #ddd;
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
        }

        .event-tag:hover {
            border-color: rgba(0,255,150,0.4);
            color: var(--green);
            transform: translateY(-2px);
        }

        .event-tag.highlight {
            border-color: rgba(180,0,255,0.35);
            color: #c77dff;
        }

        .event-tag.highlight:hover {
            border-color: var(--purple);
            color: #d9a0ff;
        }

        /* ── FOOTER ── */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 32px 20px;
            font-size: 0.78rem;
            color: #444;
            letter-spacing: 1px;
        }

        /* ── CONTAINER ── */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .about-card { padding: 18px 18px; }
            .insta-btn  { padding: 10px 18px; }
        }
    </style>
</head>
