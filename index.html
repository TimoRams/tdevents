<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David & Timo DJ</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 10px;
        }

        p {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            color: #bbbbbb;
            margin-bottom: 30px;
        }

        img {
            width: 100%;
            max-width: 600px;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 255, 150, 0.2);
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hallo von David & Timo 🎧</h1>
        <p>DJ Duo — coming soon</p>

        <img src="images/dj.jpg" alt="David und Timo">

        <footer>
            © 2026 David & Timo
        </footer>
    </div>
</body>
</html>
